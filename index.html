<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rośliny na balkon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4f0;
      color: #2d3a2d;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #2d5a27 0%, #4a8c3f 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    header h1 { font-size: 2rem; font-weight: 700; }
    header p { opacity: 0.85; margin-top: 0.4rem; font-size: 1rem; }

    .filters {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.2rem 1rem;
      flex-wrap: wrap;
      background: white;
      border-bottom: 1px solid #e0e8e0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .filters button {
      padding: 0.45rem 1rem;
      border: 2px solid #4a8c3f;
      border-radius: 2rem;
      background: white;
      color: #4a8c3f;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filters button:hover { background: #eef6ee; }
    .filters button.active { background: #4a8c3f; color: white; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      padding: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #e8f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      overflow: hidden;
      position: relative;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .card:hover .card-img img {
      transform: scale(1.12);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 1rem;
      pointer-events: none;
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-overlay span {
      color: white;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .card-body { padding: 1rem; }

    .card-body h3 {
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
    }

    .card-body .latin {
      font-style: italic;
      color: #6b8a6b;
      font-size: 0.85rem;
      margin-bottom: 0.6rem;
    }

    .badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-weight: 500;
    }

    .badge-zimuje { background: #d4edda; color: #155724; }
    .badge-ochrona { background: #fff3cd; color: #856404; }
    .badge-jednoroczna { background: #e2e3f1; color: #383d6e; }
    .badge-kot-ok { background: #d1ecf1; color: #0c5460; }
    .badge-kot-uwaga { background: #f8d7da; color: #721c24; }

    .card-body .snippet {
      font-size: 0.85rem;
      color: #5a6b5a;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      background: #e8f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      border-radius: 16px 16px 0 0;
    }

    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-body h2 {
      font-size: 1.5rem;
      margin-bottom: 0.2rem;
    }

    .modal-body .latin {
      font-style: italic;
      color: #6b8a6b;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .modal-body .badges { margin-bottom: 1rem; }

    .modal-body .description {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #3a4a3a;
      margin-bottom: 1.2rem;
    }

    .modal-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .detail-item {
      background: #f7faf7;
      padding: 0.7rem;
      border-radius: 8px;
    }

    .detail-item .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #6b8a6b;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .detail-item .value {
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.9);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .modal-overlay .modal { position: relative; }

    .empty {
      text-align: center;
      padding: 3rem;
      color: #6b8a6b;
      grid-column: 1 / -1;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; padding: 1rem; }
      .modal-details { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Rosliny na balkon</h1>
  <p>Balkon poludniowy &middot; pelne slonce &middot; Wroclaw &middot; z kotem</p>
</header>

<div class="filters">
  <button class="active" data-filter="all">Wszystkie</button>
  <button data-filter="zimuje-na-balkonie">Zimuje na balkonie</button>
  <button data-filter="wymaga-ochrony-zima">Wymaga ochrony zima</button>
  <button data-filter="jednoroczna">Jednoroczne</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const PLANT_ICONS = {
  'zimuje-na-balkonie': '🌿',
  'wymaga-ochrony-zima': '🏠',
  'jednoroczna': '🌸'
};

function parseFrontmatter(text) {
  const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: text.trim() };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx > -1) {
      meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
    }
  });
  return { meta, body: match[2].trim() };
}

function kotBadge(kot) {
  if (!kot || kot === '—') return '';
  const safe = kot.toLowerCase().includes('bezpieczn');
  return `<span class="badge ${safe ? 'badge-kot-ok' : 'badge-kot-uwaga'}">${safe ? '🐱 OK' : '⚠️ ' + kot}</span>`;
}

function kategoriaBadge(kat) {
  const labels = {
    'zimuje-na-balkonie': 'Zimuje na balkonie',
    'wymaga-ochrony-zima': 'Wymaga ochrony',
    'jednoroczna': 'Jednoroczna'
  };
  const cls = {
    'zimuje-na-balkonie': 'badge-zimuje',
    'wymaga-ochrony-zima': 'badge-ochrona',
    'jednoroczna': 'badge-jednoroczna'
  };
  return `<span class="badge ${cls[kat] || ''}">${labels[kat] || kat}</span>`;
}

function hasImage(slug) {
  return imageCache[slug] || false;
}

const imageCache = {};
let plants = [];

async function checkImage(slug) {
  const exts = ['jpg', 'jpeg', 'png', 'webp'];
  for (const ext of exts) {
    const url = `zdjecia/${slug}.${ext}`;
    try {
      const resp = await fetch(url, { method: 'HEAD' });
      if (resp.ok) {
        imageCache[slug] = url;
        return url;
      }
    } catch(e) {}
  }
  return null;
}

function renderImage(slug, icon, size) {
  const src = imageCache[slug];
  if (src) {
    return `<img src="${src}" alt="${slug}" loading="lazy">`;
  }
  return icon || '🌱';
}

function renderCard(plant) {
  const { slug, meta, body } = plant;
  const icon = PLANT_ICONS[meta.kategoria] || '🌱';
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.kategoria = meta.kategoria || '';
  div.innerHTML = `
    <div class="card-img">${renderImage(slug, icon)}<div class="card-overlay"><span>Kliknij, aby zobaczyc szczegoly</span></div></div>
    <div class="card-body">
      <h3>${meta.nazwa || slug}</h3>
      <div class="latin">${meta.lacinska || ''}</div>
      <div class="badges">
        ${kategoriaBadge(meta.kategoria)}
        ${kotBadge(meta.kot)}
      </div>
      <div class="snippet">${body}</div>
    </div>
  `;
  div.addEventListener('click', () => openModal(plant));
  return div;
}

function openModal(plant) {
  const { slug, meta, body } = plant;
  const icon = PLANT_ICONS[meta.kategoria] || '🌱';
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-img">${renderImage(slug, icon)}</div>
    <div class="modal-body">
      <h2>${meta.nazwa || slug}</h2>
      <div class="latin">${meta.lacinska || ''}</div>
      <div class="badges">
        ${kategoriaBadge(meta.kategoria)}
        ${kotBadge(meta.kot)}
      </div>
      <div class="description">${body}</div>
      <div class="modal-details">
        <div class="detail-item">
          <div class="label">Slonce</div>
          <div class="value">${meta.slonce || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="label">Zimowanie</div>
          <div class="value">${meta.zimowanie || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="label">W mieszkaniu</div>
          <div class="value">${meta.mieszkanie || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="label">Kot</div>
          <div class="value">${meta.kot || '—'}</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function renderGrid(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? plants : plants.filter(p => p.meta.kategoria === filter);
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">Brak roslin w tej kategorii</div>';
    return;
  }
  filtered.forEach(p => grid.appendChild(renderCard(p)));
}

document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});

async function init() {
  try {
    const resp = await fetch('manifest.json');
    const slugs = await resp.json();

    const results = await Promise.allSettled(
      slugs.map(async slug => {
        const [mdResp] = await Promise.all([
          fetch(`rosliny/${slug}.md`),
          checkImage(slug)
        ]);
        const text = await mdResp.text();
        const { meta, body } = parseFrontmatter(text);
        return { slug, meta, body };
      })
    );

    plants = results
      .filter(r => r.status === 'fulfilled')
      .map(r => r.value);

    renderGrid('all');
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">Blad ladowania: ${e.message}</div>`;
  }
}

init();
</script>

</body>
</html>
